name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Validate version consistency before any builds
  # Only runs on tag pushes, not workflow_dispatch
  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}">>$GITHUB_OUTPUT
        
      - name: Verify package.json version matches tag
        run: |
          if ! grep -q "\"version\": \"${{ steps.version.outputs.VERSION }}\"" package.json; then
            echo "Error: package.json version does not match tag ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi
          echo "✓ package.json version matches tag"
      
      - name: Verify src-tauri/Cargo.toml version matches tag
        run: |
          if ! grep -q "version = \"${{ steps.version.outputs.VERSION }}\"" src-tauri/Cargo.toml; then
            echo "Error: src-tauri/Cargo.toml version does not match tag ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi
          echo "✓ src-tauri/Cargo.toml version matches tag"

  # Build for Windows
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
          retention-days: 7

  # Build for macOS (Intel)
  build-macos-intel:
    name: Build macOS (Intel)
    runs-on: macos-12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
          retention-days: 7

  # Build for macOS (Apple Silicon)
  build-macos-arm:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload macOS ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
          retention-days: 7

  # Build for Linux (Ubuntu/Debian)
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libcairo2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: ignore
          retention-days: 7

  # Create GitHub Release with Tauri action
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version-check, build-windows, build-macos-intel, build-macos-arm, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) 2>/dev/null || true
          ls -laR artifacts/ || true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -exec shasum -a 256 {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload SHA256 checksums
        uses: actions/upload-artifact@v4
        with:
          name: sha256-checksums
          path: artifacts/SHA256SUMS.txt
          retention-days: 30

      # ─── Tauri Update Signing ────────────────────────────────────────────────
      # NOTE: To enable update signing, you must manually create the following
      # GitHub Actions secrets at:
      # https://github.com/zenla5/stemgen-gui/settings/secrets/actions
      #
      # 1. TAURI_PRIVATE_KEY — Base64-encoded Ed25519 private key
      #    (the raw 32-byte key, base64)
      #
      # 2. TAURI_SIGNING_PASSWORD — Password for the signing key
      #    Value: (your chosen passphrase)
      #
      # Without these secrets, signing is skipped and update manifests are
      # generated without signatures (for testing only).
      # ─────────────────────────────────────────────────────────────────────────

      - name: Generate Tauri update manifests
        run: |
          # Extract version from tag
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Generating update manifests for version: $VERSION"
          
          # Build the latest.json update manifest
          # This tells the Tauri updater where to find new versions
          MANIFEST="{\"name\":\"Stemgen GUI\",\"version\":\"$VERSION\",\"notes\":\"Stemgen GUI v$VERSION\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"apple\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_x64.dmg\",\"isDarkModeSupported\":true},\"windows\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_x64-setup.exe\",\"isDarkModeSupported\":true},\"linux\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_amd64.AppImage\"}}"
          
          echo "$MANIFEST" > artifacts/latest.json
          echo "Latest manifest:"
          cat artifacts/latest.json

      - name: Sign update manifests (if secrets available)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        run: |
          if [ -n "$TAURI_PRIVATE_KEY" ] && [ -n "$TAURI_SIGNING_PASSWORD" ]; then
            echo "Signing update manifests with Tauri..."
            npx @tauri-apps/cli@latest signer sign \
              --private-key "$TAURI_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PASSWORD" \
              artifacts/latest.json
            echo "Manifest signed successfully."
          else
            echo "WARNING: TAURI_PRIVATE_KEY or TAURI_SIGNING_PASSWORD not set."
            echo "Update manifests are unsigned — only for testing."
          fi

      - name: Upload update manifests
        uses: actions/upload-artifact@v4
        with:
          name: update-manifests
          path: artifacts/latest.json
          retention-days: 365

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/SHA256SUMS.txt
            artifacts/**/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
