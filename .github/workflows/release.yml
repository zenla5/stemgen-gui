name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Inline version check (runs inside release job on tag pushes) ───────────
  # This replaces the standalone version-check job so that workflow_dispatch
  # (which sets github.ref to refs/heads/main) does not skip the release job.
  # The release job itself gates on version consistency only when triggered by a tag.

  # Build for Windows
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    # Only run on tag pushes or manual workflow_dispatch — not on every push
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: List bundle directory
        run: |
          echo "=== Bundle directory contents ==="
          ls -laR src-tauri/target/release/bundle/ 2>/dev/null || echo "Bundle directory not found"
          echo ""
          echo "=== Looking for installer files ==="
          find src-tauri/target/release -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) 2>/dev/null || echo "No installer files found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/**/**/*.msi
            src-tauri/target/release/bundle/**/**/*.exe
          # Fail loudly if no artifacts are produced
          if-no-files-found: error
          retention-days: 7

  # Build for macOS (Apple Silicon)
  build-macos-arm:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    # Only run on tag pushes or manual workflow_dispatch — not on every push
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: List bundle directory
        run: |
          echo "=== Bundle directory contents ==="
          ls -laR src-tauri/target/release/bundle/ 2>/dev/null || echo "Bundle directory not found"
          echo ""
          echo "=== Looking for installer files ==="
          find src-tauri/target/release -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) 2>/dev/null || echo "No installer files found"

      - name: Package .app bundle as zip
        run: |
          echo "=== Packaging .app bundle ==="
          if [ -d "src-tauri/target/release/bundle/dmg/Stemgen GUI.app" ]; then
            cd src-tauri/target/release/bundle/dmg
            zip -r "Stemgen-GUI.zip" "Stemgen GUI.app"
            echo "Packaged: Stemgen-GUI.zip"
            ls -la
          elif [ -d "src-tauri/target/release/bundle/macos/Stemgen GUI.app" ]; then
            cd src-tauri/target/release/bundle/macos
            zip -r "Stemgen-GUI.zip" "Stemgen GUI.app"
            echo "Packaged: Stemgen-GUI.zip"
            ls -la
          else
            echo "ERROR: .app bundle not found at expected paths"
            ls -laR src-tauri/target/release/bundle/ 2>/dev/null || true
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/**/**/*.dmg
            src-tauri/target/release/bundle/dmg/*.zip
            src-tauri/target/release/bundle/macos/*.zip
          # Fail loudly if no artifacts are produced
          if-no-files-found: error
          retention-days: 7

  # Build for Linux (Ubuntu/Debian)
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    # Only run on tag pushes or manual workflow_dispatch — not on every push
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: List bundle directory
        run: |
          echo "=== Bundle directory contents ==="
          ls -laR src-tauri/target/release/bundle/ 2>/dev/null || echo "Bundle directory not found"
          echo ""
          echo "=== Looking for installer files ==="
          find src-tauri/target/release -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) 2>/dev/null || echo "No installer files found"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/**/**/*.deb
            src-tauri/target/release/bundle/**/**/*.AppImage
            src-tauri/target/release/bundle/**/**/*.rpm
          # Fail loudly if no artifacts are produced
          if-no-files-found: error
          retention-days: 7

  # Create GitHub Release with Tauri action
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # TASK 3: Depend only on build jobs — not on version-check — so that
    # workflow_dispatch (which skips version-check) can still create a release.
    needs: [build-windows, build-macos-arm, build-linux]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TASK 3: Inline version check — only enforced when triggered by a tag push.
      # workflow_dispatch callers pass the version explicitly so we skip the check.
      - name: Version consistency check (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tagged version: $VERSION"
          if ! grep -q "\"version\": \"$VERSION\"" package.json; then
            echo "Error: package.json version does not match tag $VERSION"
            exit 1
          fi
          echo "✓ package.json version matches tag"
          if ! grep -q "version = \"$VERSION\"" src-tauri/Cargo.toml; then
            echo "Error: src-tauri/Cargo.toml version does not match tag $VERSION"
            exit 1
          fi
          echo "✓ src-tauri/Cargo.toml version matches tag"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Listing all files in artifacts directory ==="
          ls -laR artifacts/ || true
          echo ""
          echo "=== Looking for build artifacts ==="
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) 2>/dev/null || echo "No artifacts found"

      - name: Generate SHA256 checksums
        run: |
          echo "=== Generating SHA256 checksums ==="
          if [ ! -d "artifacts" ]; then
            echo "ERROR: artifacts directory does not exist — build jobs may have failed"
            exit 1
          fi

          cd artifacts || exit 1

          find . -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.zip" \) > /tmp/artifacts.txt
          if [ -s /tmp/artifacts.txt ]; then
            while IFS= read -r file; do
              shasum -a 256 "$file" >> SHA256SUMS.txt
            done < /tmp/artifacts.txt
            echo "Checksums generated:"
            cat SHA256SUMS.txt || echo "No checksums generated"
          else
            echo "ERROR: No artifact files found — cannot generate checksums"
            exit 1
          fi

      - name: Upload SHA256 checksums
        uses: actions/upload-artifact@v4
        with:
          name: sha256-checksums
          path: artifacts/SHA256SUMS.txt
          retention-days: 30

      # ─── Tauri Update Signing ────────────────────────────────────────────────
      # NOTE: To enable update signing, you must manually create the following
      # GitHub Actions secrets at:
      # https://github.com/zenla5/stemgen-gui/settings/secrets/actions
      #
      # 1. TAURI_PRIVATE_KEY — Base64-encoded Ed25519 private key
      #    (the raw 32-byte key, base64)
      #
      # 2. TAURI_SIGNING_PASSWORD — Password for the signing key
      #    Value: (your chosen passphrase)
      #
      # Without these secrets, signing is skipped and update manifests are
      # generated without signatures (for testing only).
      # ─────────────────────────────────────────────────────────────────────────

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate Tauri update manifests
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Generating update manifests for version: $VERSION"

          mkdir -p artifacts

          # Build the latest.json update manifest
          MANIFEST="{\"name\":\"Stemgen GUI\",\"version\":\"$VERSION\",\"notes\":\"Stemgen GUI v$VERSION\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"apple\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_aarch64.dmg\",\"isDarkModeSupported\":true},\"windows\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_x64-setup.exe\",\"isDarkModeSupported\":true},\"linux\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_amd64.AppImage\"}}"

          echo "$MANIFEST" > artifacts/latest.json
          echo "Latest manifest:"
          cat artifacts/latest.json

      - name: Sign update manifests (if secrets available)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        run: |
          if [ -n "$TAURI_PRIVATE_KEY" ] && [ -n "$TAURI_SIGNING_PASSWORD" ]; then
            echo "Signing update manifests with Tauri..."
            npx @tauri-apps/cli@latest signer sign \
              --private-key "$TAURI_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PASSWORD" \
              artifacts/latest.json
            echo "Manifest signed successfully."
          else
            echo "WARNING: TAURI_PRIVATE_KEY or TAURI_SIGNING_PASSWORD not set."
            echo "Update manifests are unsigned — only for testing."
          fi

      - name: Upload update manifests
        uses: actions/upload-artifact@v4
        with:
          name: update-manifests
          path: artifacts/latest.json
          retention-days: 365

      # TASK 4: Publish immediately — draft is set to false so the release is
      # public as soon as softprops/action-gh-release creates it. All artifacts
      # are already downloaded and globbed locally before this step runs, so
      # there is no risk of a partially-populated release becoming visible:
      # the action atomically creates the release with ALL files or fails.
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
            artifacts/**/SHA256SUMS.txt
            artifacts/**/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
