name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Windows release
        run: |
          echo "=== Building release binary ==="
          cargo build --release --target x86_64-pc-windows-msvc 2>&1 | Tee-Object -File "$env:TEMP\cargo-build.log"
          echo ""
          echo "=== Cargo build tail ==="
          Get-Content "$env:TEMP\cargo-build.log" -Tail 10
        working-directory: src-tauri
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
      - name: Build Windows installers
        run: |
          echo "=== Binary check ==="
          if (!(Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release/Stemgen-GUI.exe")) {
            echo "ERROR: Binary not found"
            exit 1
          }
          echo "Binary found, creating installers..."
          echo "=== Tauri version ==="
          .\node_modules\.bin\tauri.cmd --version
          echo ""
          $ErrorActionPreference = "Continue"
          $env:TAURI_BUILD_NO_CARGO = "true"
          .\node_modules\.bin\tauri.cmd build --bundles msi,nsis --target x86_64-pc-windows-msvc 2>&1 | Tee-Object -File "$env:TEMP\tauri-build.log"
          $exitCode = $LASTEXITCODE
          echo ""
          echo "=== Tauri build exit code: $exitCode ==="
          Get-Content "$env:TEMP\tauri-build.log" -Tail 50
          if ($exitCode -ne 0) { exit $exitCode }
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
      - name: Verify build outputs
        run: |
          echo "=== Release binary ==="
          if (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release/Stemgen-GUI.exe") {
            Get-Item "src-tauri/target/x86_64-pc-windows-msvc/release/Stemgen-GUI.exe" | Select-Object Name, Length | Format-Table -AutoSize
          } else {
            Write-Host "WARNING: No Stemgen-GUI.exe found"
            Get-ChildItem src-tauri/target -Filter "*.exe" -Recurse -File | Select-Object FullName, Length | Format-Table -AutoSize
          }
          echo ""
          echo "=== Bundle directory ==="
          if (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle") {
            Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release/bundle -Recurse -File | Select-Object FullName, Length | Format-Table -AutoSize
          } else {
            Write-Host "WARNING: No bundle directory found"
          }
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/Stemgen-GUI.exe
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build macOS release
        run: |
          echo "=== Building release binary ==="
          cargo build --release --target aarch64-apple-darwin 2>&1 | tee /tmp/cargo-build.log
          echo ""
          echo "=== Cargo build tail ==="
          tail -10 /tmp/cargo-build.log
        working-directory: src-tauri
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
      - name: Build macOS .app bundle
        run: |
          echo "=== Binary check ==="
          if [ ! -f "src-tauri/target/aarch64-apple-darwin/release/Stemgen GUI.app" ]; then
            echo "WARNING: .app bundle not pre-built, Tauri will create it"
          fi
          echo "Creating .app bundle..."
          npx tauri build --bundles app --target aarch64-apple-darwin 2>&1 | tee /tmp/tauri-build.log
          echo ""
          echo "=== Tauri build log tail ==="
          tail -30 /tmp/tauri-build.log
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
      - name: Find and package .app bundle
        id: package
        run: |
          echo "=== Listing target/aarch64-apple-darwin/release ==="
          ls -la target/aarch64-apple-darwin/release/ 2>/dev/null | head -20
          echo ""
          echo "=== Searching for .app bundle ==="
          APP_DIR=$(find . -name "*.app" -type d 2>/dev/null | grep "target/aarch64" | head -1)
          if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
            echo "ERROR: No .app bundle found"
            find . -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          echo "Found: $APP_DIR"
          echo ""
          echo "=== Packaging .app as zip ==="
          cd "$(dirname "$APP_DIR")"
          ZIP_NAME="$(basename "$APP_DIR" .app | tr ' ' '_').zip"
          echo "Creating $ZIP_NAME..."
          zip -r "$ZIP_NAME" "$(basename "$APP_DIR")"
          if [ ! -f "$ZIP_NAME" ]; then
            echo "ERROR: zip failed"
            exit 1
          fi
          ls -lh "$ZIP_NAME"
          unzip -l "$ZIP_NAME" | head -5
          echo ""
          echo "=== Copy zip to workspace root with .dmg extension ==="
          DMG_NAME="Stemgen-GUI_aarch64.dmg"
          cp "$ZIP_NAME" "$GITHUB_WORKSPACE/$DMG_NAME"
          echo "Copied to: $GITHUB_WORKSPACE/$DMG_NAME"
          echo "dmg_file=$DMG_NAME" >> "$GITHUB_OUTPUT"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-artifacts
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/
            src-tauri/target/aarch64-apple-darwin/release/Stemgen-GUI
            ${{ github.workspace }}/${{ steps.package.outputs.dmg_file }}
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config libasound2-dev libgtk-3-dev \
            libgdk-pixbuf2.0-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libglib2.0-dev libcairo2-dev \
            libayatana-appindicator3-dev libdbus-1-dev ffmpeg zip
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Linux release
        run: |
          echo "=== Building release binary ==="
          cargo build --release 2>&1 | tee /tmp/cargo-build.log
          echo ""
          echo "=== Cargo build tail ==="
          tail -10 /tmp/cargo-build.log
        working-directory: src-tauri
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
      - name: Build Linux installers
        run: |
          echo "=== Binary check ==="
          if [ ! -f "src-tauri/target/release/stemgen-gui" ]; then
            echo "ERROR: Binary not found"
            ls -la src-tauri/target/release/ 2>/dev/null | head -20
            exit 1
          fi
          echo "Binary found: $(ls -lh src-tauri/target/release/stemgen-gui)"
          echo ""
          echo "=== Creating installers ==="
          echo "=== Tauri version ==="
          ./node_modules/.bin/tauri --version
          echo ""
          TAURI_BUILD_NO_CARGO=true ./node_modules/.bin/tauri build --bundles deb,appimage,rpm 2>&1 | tee /tmp/tauri-build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== Tauri build exit code: $EXIT_CODE ==="
          tail -50 /tmp/tauri-build.log
          if [ $EXIT_CODE -ne 0 ]; then exit $EXIT_CODE; fi
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
      - name: Verify build outputs
        run: |
          echo "=== Release binary ==="
          if [ -f "src-tauri/target/release/stemgen-gui" ]; then
            ls -lh src-tauri/target/release/stemgen-gui
          else
            echo "WARNING: No stemgen-gui binary found"
            ls -la src-tauri/target/release/ 2>/dev/null | head -20
          fi
          echo ""
          echo "=== Bundle directory ==="
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle directory"
          echo ""
          echo "=== Package files (glob search) ==="
          find src-tauri/target/release -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \) -exec ls -lh {} \; 2>/dev/null || echo "No package files found"
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/stemgen-gui
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Version consistency check (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tagged version: $VERSION"
          if ! grep -q "\"version\": \"$VERSION\"" package.json; then
            echo "Error: package.json version does not match tag $VERSION"
            exit 1
          fi
          echo "package.json version matches tag"
          if ! grep -q "version = \"$VERSION\"" src-tauri/Cargo.toml; then
            echo "Error: src-tauri/Cargo.toml version does not match tag $VERSION"
            exit 1
          fi
          echo "src-tauri/Cargo.toml version matches tag"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: |
          echo "=== All artifact files ==="
          find artifacts -type f 2>/dev/null || echo "No artifacts found"
      - name: Generate SHA256 checksums
        run: |
          echo "=== Generating SHA256 checksums ==="
          if [ ! -d "artifacts" ]; then
            echo "ERROR: artifacts directory does not exist"
            exit 1
          fi
          cd artifacts || exit 1
          find . -type f | while IFS= read -r file; do
            echo "Hashing: $file"
            shasum -a 256 "$file" >> SHA256SUMS.txt
          done
          if [ -s SHA256SUMS.txt ]; then
            echo "Checksums generated:"
            cat SHA256SUMS.txt
          else
            echo "ERROR: No artifact files found"
            find . -type f | head -20
            exit 1
          fi
      - name: Upload SHA256 checksums
        uses: actions/upload-artifact@v4
        with:
          name: sha256-checksums
          path: artifacts/SHA256SUMS.txt
          retention-days: 30
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
      - name: Generate Tauri update manifests
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p artifacts
          MANIFEST="{\"name\":\"Stemgen GUI\",\"version\":\"$VERSION\",\"notes\":\"Stemgen GUI v$VERSION\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"apple\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_aarch64.dmg\",\"isDarkModeSupported\":true},\"windows\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_x64-setup.exe\",\"isDarkModeSupported\":true},\"linux\":{\"url\":\"https://github.com/zenla5/stemgen-gui/releases/download/v$VERSION/Stemgen-GUI_${VERSION}_amd64.AppImage\"}}"
          echo "$MANIFEST" > artifacts/latest.json
          echo "Latest manifest:"
          cat artifacts/latest.json
      - name: Sign update manifests (if secrets available)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        run: |
          if [ -n "$TAURI_PRIVATE_KEY" ] && [ -n "$TAURI_SIGNING_PASSWORD" ]; then
            echo "Signing update manifests..."
            npx @tauri-apps/cli@latest signer sign --private-key "$TAURI_PRIVATE_KEY" --password "$TAURI_SIGNING_PASSWORD" artifacts/latest.json
            echo "Manifest signed."
          else
            echo "WARNING: TAURI_PRIVATE_KEY or TAURI_SIGNING_PASSWORD not set — manifests unsigned."
          fi
      - name: Upload update manifests
        uses: actions/upload-artifact@v4
        with:
          name: update-manifests
          path: artifacts/latest.json
          retention-days: 365
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
            artifacts/**/SHA256SUMS.txt
            artifacts/**/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
