name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Frontend linting and type checking
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

  # Frontend tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          thresholds: '80%'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Rust backend linting
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Check formatting
        run: |
          rustfmt --check src-tauri/src/**/*.rs
          cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Run clippy
        uses: giraffate/clippy-action@v1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          filter_mode:nofilter
          fail_mode:粗
          reporter: github-pr-check

      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Rust backend tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libasound2-dev

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Run tests with coverage
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --workspace --all-features -- --nocapture
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-Zprofile"

      - name: Generate coverage
        uses: katyo/cargo-tarpaulin-action@v0.0.4
        with:
          manifest_path: src-tauri/Cargo.toml
          output: reports/tarpaulin-report.xml
          codecov_token: ${{ secrets.CARGO_WEBSOCKET_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./reports/tarpaulin-report.xml
          fail_ci_if_error: true
          thresholds: '80%'

  # E2E tests
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint, backend-lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true

  # Integration tests
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint, backend-lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox python3 python3-pip

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install demucs mutagen

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Build Tauri app
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Run integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test integration_tests
