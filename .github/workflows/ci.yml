name: CI

# Re-triggered with debug commit

on:
  push:
    branches: [main, develop, '**']
  pull_request:
    branches: [main, develop, '**']

env:
  CARGO_TERM_COLOR: always

jobs:
  # Frontend tests and linting
  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run check
      
      - name: Lint
        run: npm run lint
      
      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage --coverage.thresholds.lines 0 --coverage.thresholds.functions 0 --coverage.thresholds.branches 0 --coverage.thresholds.statements 0

  # Frontend integration tests (React component tests)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run integration tests with coverage
        run: npm run test:integration -- --coverage --coverage.thresholds.lines 0 --coverage.thresholds.functions 0 --coverage.thresholds.branches 0 --coverage.thresholds.statements 0
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # E2E tests - simplified to single browser on Ubuntu
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: npx playwright test --project=chromium
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Rust backend tests (includes unit + integration tests in src-tauri/tests/)
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install GTK dependencies (for Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libssl-dev \
            pkg-config \
            libasound2-dev
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Check Rust formatting
        run: |
          cd src-tauri && cargo fmt --check || true
      
      - name: Clippy linting
        run: |
          echo "=== Clippy output ==="
          cd src-tauri && cargo clippy --lib --bins 2>&1 | tee clippy_output.txt
          CLIPPY_EXIT=${PIPESTATUS[0]}
          echo "Clippy exit code: $CLIPPY_EXIT"
          if [ $CLIPPY_EXIT -ne 0 ]; then
            echo "=== Clippy failed! ==="
            grep -E "^error" clippy_output.txt && echo "ERRORS found" || echo "Only warnings"
            grep -E "warning:" clippy_output.txt | head -30
          fi
          exit $CLIPPY_EXIT
      
      - name: Build release
        run: |
          echo "=== Building release ==="
          cd src-tauri && cargo build --release
          echo "Build exit code: $?"
      
      - name: Run tests
        # Runs unit tests for lib crate only (no Tauri binary needed)
        # Integration tests in tests/ are also included
        run: |
          echo "=== Running cargo test (lib + integration) ==="
          cd src-tauri && cargo test --lib --tests 2>&1
          echo "Exit code: $?"
      
      - name: Upload backend artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-artifacts
          path: |
            src-tauri/clippy_output.txt
            src-tauri/build_output.txt
            src-tauri/test_output.txt
          retention-days: 7

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --audit-level=high || true
        continue-on-error: true
      
      - name: Run cargo-audit
        run: cargo install cargo-audit && cargo audit || true
        continue-on-error: true

  # Final check
  check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend, integration, backend, e2e, security]
    if: always()
    
    steps:
      - name: Verify core jobs passed
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "Frontend tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration.result }}" == "failure" ]]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.backend.result }}" == "failure" ]]; then
            echo "Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e.result }}" == "failure" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All critical checks passed!"
