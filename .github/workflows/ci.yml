name: CI

on:
  push:
    branches: [main, develop, '**']
  pull_request:
    branches: [main, develop, '**']

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Frontend tests and linting
  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run check
      
      - name: Lint
        run: npm run lint
      
      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Check coverage thresholds
        run: |
          echo "=== Coverage Report Summary ==="
          echo "Thresholds: lines 40%, functions 60%, branches 85%, statements 40%"
          echo "If thresholds are not met, CI will fail here."

  # Frontend integration tests (React component tests)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run integration tests (component rendering tests)
        run: npm run test:integration

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: integration-test-results
          path: |
            test-results/
          retention-days: 7

  # E2E tests - Playwright tests with built-in dev server
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Rust backend: clippy, fmt, build, and tests
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install system dependencies (Tauri + FFmpeg for tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libdbus-1-dev \
            ffmpeg \
            libayatana-appindicator3-dev
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Check Rust formatting
        run: |
          cd src-tauri && cargo fmt --check
        env:
          RUST_BACKTRACE: 1
      
      - name: Clippy linting (blocking)
        run: |
          cd src-tauri && cargo clippy --lib --bins -- -D warnings
        env:
          RUST_BACKTRACE: 1
      
      - name: Build release
        run: |
          cd src-tauri && cargo build --release
          echo "Build exit code: $?"
      
      - name: Run Rust tests
        run: |
          echo "=== Running cargo test --lib (library tests only) ==="
          cd src-tauri && cargo test --lib 2>&1
          echo "Test exit code: $?"
      
      - name: Run Rust integration tests
        run: |
          echo "=== Running cargo test --tests (integration tests) ==="
          cd src-tauri && cargo test --tests 2>&1
          echo "Integration test exit code: $?"

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --audit-level=high || true
        continue-on-error: true
      
      - name: Run cargo-audit
        run: cargo install cargo-audit && cargo audit || true
        continue-on-error: true

  # Final check
  check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend, integration, backend, e2e, security]
    if: always()
    
    steps:
      - name: Verify core jobs passed
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "Frontend tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration.result }}" == "failure" ]]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.backend.result }}" == "failure" ]]; then
            echo "Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e.result }}" == "failure" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All critical checks passed!"
